  # -- GUI - Windows

  build-gui-windows:
    needs: prepare
    runs-on: windows-latest
    env:
      VITE_BEEP_VERSION: ${{ needs.prepare.outputs.version }}
      VITE_GIT_SHA: ${{ needs.prepare.outputs.git_sha }}
    steps:
      - uses: actions/checkout@v4

      - name: Inject version into manifests
        shell: bash
        run: |
          V="${{ needs.prepare.outputs.version }}"
          sed -i "s/^version = \".*\"/version = \"$V\"/" Cargo.toml
          sed -i "s/\"version\": \"[^\"]*\"/\"version\": \"$V\"/" crates/beep-gui/package.json
          sed -i "s/\"version\": \"[^\"]*\"/\"version\": \"$V\"/" crates/beep-gui/src-tauri/tauri.conf.json

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install frontend deps
        run: npm install
        working-directory: crates/beep-gui

      - name: Build Tauri (exe only, no installer)
        run: npx tauri build --target x86_64-pc-windows-msvc --bundles ""
        working-directory: crates/beep-gui

      # - name: Build Tauri (with MSI/NSIS installers)
      #   run: npx tauri build --target x86_64-pc-windows-msvc
      #   working-directory: crates/beep-gui

      - name: Upload bundles
        uses: actions/upload-artifact@v4
        with:
          name: beep-gui-windows-x64
          path: |
            target/x86_64-pc-windows-msvc/release/beep-gui.exe
          # path: |
          #   target/x86_64-pc-windows-msvc/release/bundle/msi/*.msi
          #   target/x86_64-pc-windows-msvc/release/bundle/nsis/*.exe
          if-no-files-found: error

  # -- GUI - Linux

  build-gui-linux:
    needs: prepare
    runs-on: ubuntu-latest
    env:
      VITE_BEEP_VERSION: ${{ needs.prepare.outputs.version }}
      VITE_GIT_SHA: ${{ needs.prepare.outputs.git_sha }}
    steps:
      - uses: actions/checkout@v4

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev build-essential \
            libssl-dev libayatana-appindicator3-dev librsvg2-dev patchelf

      - name: Inject version into manifests
        run: |
          V="${{ needs.prepare.outputs.version }}"
          sed -i "s/^version = \".*\"/version = \"$V\"/" Cargo.toml
          sed -i "s/\"version\": \"[^\"]*\"/\"version\": \"$V\"/" crates/beep-gui/package.json
          sed -i "s/\"version\": \"[^\"]*\"/\"version\": \"$V\"/" crates/beep-gui/src-tauri/tauri.conf.json

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install frontend deps
        run: npm install
        working-directory: crates/beep-gui

      - name: Build Tauri
        run: npx tauri build --target x86_64-unknown-linux-gnu
        working-directory: crates/beep-gui

      - name: Upload bundles
        uses: actions/upload-artifact@v4
        with:
          name: beep-gui-linux-x64
          path: |
            target/x86_64-unknown-linux-gnu/release/bundle/deb/*.deb
            target/x86_64-unknown-linux-gnu/release/bundle/appimage/*.AppImage
          if-no-files-found: error

  # -- GUI - macOS

  build-gui-macos:
