          sed -i "" "s/^version = \".*\"/version = \"$V\"/" Cargo.toml
          sed -i "" "s/\"version\": \"[^\"]*\"/\"version\": \"$V\"/" crates/beep-gui/package.json
          sed -i "" "s/\"version\": \"[^\"]*\"/\"version\": \"$V\"/" crates/beep-gui/src-tauri/tauri.conf.json

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install frontend deps
        run: npm install
        working-directory: crates/beep-gui

      - name: Build Tauri
        run: npx tauri build --target aarch64-apple-darwin
        working-directory: crates/beep-gui

      - name: Upload bundles
        uses: actions/upload-artifact@v4
        with:
          name: beep-gui-macos-arm64
          path: |
            target/aarch64-apple-darwin/release/bundle/dmg/*.dmg
          if-no-files-found: error

  # -- Create GitHub Release

  create-release:
    permissions:
      contents: write
    needs:
      - prepare
      # - build-cli-windows
      # - build-cli-linux
      # - build-cli-macos
      # - build-tui-windows
      # - build-tui-linux
      # - build-tui-macos
      - build-gui-windows
      - build-gui-linux
      - build-gui-macos
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.prepare.outputs.version }}
          name: v${{ needs.prepare.outputs.version }}
          body: |
            _Add release notes before publishing_
          draft: true
          prerelease: false
          files: artifacts/**/*
        env:
          GITHUB_TOKEN: ${{ github.token }}
